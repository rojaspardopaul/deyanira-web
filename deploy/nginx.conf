# ============================================================
# Nginx hardened — Deyanira (frontal del API en Railway/VM)
# Asume Next.js servido por Vercel; este nginx es para el API
# Express. Si el API también va a un PaaS gestionado, ignorar.
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  # ── Básicos ───────────────────────────────────────────────
  charset utf-8;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  server_tokens off;
  types_hash_max_size 4096;
  include mime.types;
  default_type application/octet-stream;

  # Tamaño máximo de body (imágenes 12MB)
  client_max_body_size 12m;
  client_body_buffer_size 128k;
  client_body_timeout 12s;
  client_header_timeout 12s;
  send_timeout 12s;
  reset_timedout_connection on;

  # ── Logs JSON estructurados ───────────────────────────────
  log_format json escape=json '{'
    '"ts":"$time_iso8601",'
    '"ip":"$remote_addr",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"rt":$request_time,'
    '"ua":"$http_user_agent",'
    '"ref":"$http_referer",'
    '"reqid":"$http_x_request_id"'
  '}';
  access_log /var/log/nginx/access.log json buffer=32k flush=5s;
  error_log  /var/log/nginx/error.log warn;

  # ── Compresión ────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

  # ── Rate limiting básico (defensa en profundidad) ─────────
  limit_req_zone $binary_remote_addr zone=api_rl:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=login_rl:10m rate=10r/m;
  limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

  # ── TLS / Server ──────────────────────────────────────────
  upstream api_upstream {
    server 127.0.0.1:3001;
    keepalive 32;
  }

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    listen [::]:80;
    server_name api.deyanira.pe;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.deyanira.pe;

    # Certificados Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/api.deyanira.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.deyanira.pe/privkey.pem;

    # TLS hardening (Mozilla Intermediate, 2026)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/api.deyanira.pe/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ── Security headers (defensa en profundidad, el API ya los envía) ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Bloquea métodos no usados
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
      return 405;
    }

    limit_conn conn_per_ip 50;

    # Endpoint de login: rate limit más estricto
    location = /api/auth/admin/login {
      limit_req zone=login_rl burst=5 nodelay;
      proxy_pass http://api_upstream;
      include /etc/nginx/proxy_params.conf;
    }

    location /api/ {
      limit_req zone=api_rl burst=50 nodelay;
      proxy_pass http://api_upstream;
      include /etc/nginx/proxy_params.conf;
    }

    location / {
      return 404;
    }
  }
}
