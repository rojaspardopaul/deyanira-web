name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-and-build:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Variables dummy para que el build de Next no falle
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGc.dummy
      NEXT_PUBLIC_API_URL: http://localhost:3001
      DATABASE_URL: postgresql://user:pass@localhost:5432/dummy
      ADMIN_JWT_SECRET: this-is-a-dummy-secret-for-ci-only-32chars-min

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit (high & critical only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: Run gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
